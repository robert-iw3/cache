# ==============================================================================
# DEEP VISIBILITY SENSOR - MASTER CONFIGURATION
# ==============================================================================

[ProcessExclusions]
# ==============================================================================
# ALTERNATE DATA STREAM (ADS) & NOISE FILTERING
# ==============================================================================
# These processes are highly noisy and safely excluded from specific deep OS hooks.
# ==============================================================================
BenignADSProcs = coreserviceshell.exe, explorer.exe, msedge.exe, chrome.exe, onedrive.exe
TrustedNoise   = svchost.exe, wmiprvse.exe, taskhostw.exe, dllhost.exe, backgroundtaskhost.exe, asussystemanalysis.exe, samsungmagician.exe

[RegistryExclusions]
# ==============================================================================
# EXPLORER.EXE REGISTRY NOISE
# ==============================================================================
# Benign keys frequently spammed by explorer.exe during normal user operation.
# ==============================================================================
BenignExplorerValues = Zvpebfbsg.Jvaqbjf.Rkcybere, HRZR_PGYFRFFVBA, IdleInWorkingState, WritePermissionsCheck, GlobalUserStartTime