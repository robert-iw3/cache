# ==============================================================================
# DEEP VISIBILITY SENSOR - MASTER CONFIGURATION
# ==============================================================================
# This file controls exactly what the sensor considers "normal" Windows behavior.
# Everything listed here is deliberately filtered out at the C# level to keep
# the HUD and alerts clean. The Rust ML/UEBA engine still sees everything and
# will learn/suppress on its own.

[ProcessExclusions]
# ==============================================================================
# 1. BenignADSProcs - Processes that are extremely noisy but almost never malicious
#    These are excluded from deep memory scanning, YARA, and most ETW hooks.
#    Removing any of these will dramatically increase false positives.
# ==============================================================================
BenignADSProcs = coreserviceshell.exe, explorer.exe, msedge.exe, chrome.exe, onedrive.exe,
                 msedgewebview2.exe, SearchApp.exe, sihost.exe, ctfmon.exe, conhost.exe,
                 backgroundtaskhost.exe, Teams.exe, Outlook.exe, OneDrive.exe, msiexec.exe,
                 TiWorker.exe, wuauclt.exe, MoUsoCoreWorker.exe, usocoreworker.exe

# ==============================================================================
# 2. TrustedNoise - System processes that generate tons of legitimate activity
#    These are excluded from Sigma matching and many kernel-level alerts.
# ==============================================================================
TrustedNoise = svchost.exe, wmiprvse.exe, taskhostw.exe, dllhost.exe, backgroundtaskhost.exe,
               asussystemanalysis.exe, samsungmagician.exe, Code.exe, CodeHelper.exe,
               devenv.exe, microsoft.visualstudio.code.*

# ==============================================================================
# 3. ExtraBenignLineages - Parent → Child process pairs that are almost always benign
#    Format: parent.exe|child.exe
#    This is the most powerful noise filter. Add any common developer/admin tool chains here.
# ==============================================================================
ExtraBenignLineages = code.exe|powershell.exe, devenv.exe|powershell.exe, msedge.exe|powershell.exe,
                      explorer.exe|cmd.exe, wbengine.exe|vssadmin.exe, sihost.exe|powershell.exe,
                      taskhostw.exe|powershell.exe, explorer.exe|powershell.exe

# ==============================================================================
# 4. ExtraSuppressedRules - Sigma rule titles (or parts of titles) you want globally ignored
#    Add any rule that keeps firing even after the strict compiler filter.
# ==============================================================================
ExtraSuppressedRules = PresentationHost, XBAP, Double Extension, Suspicious Double Extension,
                       Suspicious WMI Event Consumer, PowerShell Downgrade Attack

[RegistryExclusions]
# ==============================================================================
# BenignExplorerValues - Registry values that explorer.exe writes constantly during normal use
#    These are excluded from registry persistence detection and Sigma registry rules.
# ==============================================================================
BenignExplorerValues = Zvpebfsbgg.Jvaqbjf.Rkcybere, HRZR_PGYFRFFVBA, IdleInWorkingState,
                       WritePermissionsCheck, GlobalUserStartTime, ThumbnailCache,
                       ShellState, BagMRU, LastVisitedPidlMRU