[NetworkExclusions]
# DEVELOPER NOTE: Suffix matching. ".windows.com" will safely drop "telemetry.windows.com"
# Local & Internal Routing, Microsoft & Azure Core Telemetry, Google & Android Ecosystem, AWS/Cloudflare/Fastly, Apple, Dev/Telemetry, PKI, Unified Comms, Enterprise AV
DnsExclusions = .arpa, .local, .lan, .home, .corp, microsoft.com, windows.com, windowsupdate.com, azure.com, azureedge.net, azurefd.net, trafficmanager.net, live.com, office.com, office365.com, skype.com, msn.com, bing.com, visualstudio.com, microsoftonline.com, sharepoint.com, msedge.net, msauth.net, msftauth.net, applicationinsights.io, windows.net, akadns.net, akamaized.net, akamaiedge.net, msocdn.com, google.com, googleapis.com, 1e100.net, gstatic.com, gvt1.com, gvt2.com, youtube.com, ytimg.com, googlevideo.com, amazonaws.com, cloudfront.net, cloudflare.com, cloudflare.net, fastly.net, apple.com, icloud.com, mzstatic.com, github.com, githubusercontent.com, sentry.io, vscode.dev, vsassets.io, adobe.com, acrobat.com, digicert.com, symcb.com, sectigo.com, crl.com, ocsp.com, lencr.org, pki.goog, zoom.us, webex.com, slack-edge.com, discord.gg, discordapp.com, trendmicro.com, tmok.tm, mcafee.com, trellix.com, symantec.com, sophos.com, crowdstrike.com

# High-Volume CDNs, Loopback, Multicast, Class E, Trusted Upstream DNS Resolvers, Subnet Broadcasts
IpExclusions = ^52\., ^142\.25[0-9]\., ^13\., ^20\., ^23\., ^74\.125\., ^127\., ^2(?:2[4-9]|3[0-9])\., ^2[4-5][0-9]\., ^1\.1\.1\.1$, ^1\.0\.0\.1$, ^8\.8\.8\.8$, ^8\.8\.4\.4$, ^9\.9\.9\.9$, \.255$

[ProcessExclusions]
# WARNING: NEVER add "svchost", "explorer", or "lsass" to this list. C2 beacons hide there.
# Browsers, Heavy Electron Apps, Cloud Sync, Windows UI Components, AV/Security Engines
ProcessExclusions = chrome, msedge, msedgewebview2, firefox, brave, opera, iexplore, spotify, teams, discord, slack, zoom, webex, whatsapp, onedrive, dropbox, googledrivesync, googleupdate, mousocoreworker, tiworker, searchapp, searchui, startmenuexperiencehost, shellexperiencehost, backgroundtaskhost, compattelrunner, fontdrvhost, dwm, dashost, coreserviceshell, msmpeng, nissrv, securityhealthservice, smartscreen

[AppGuardDefinitions]
# Authorized daemons that should never spawn shells
WebDaemons = w3wp, iisexpress, httpd, nginx, lighttpd, caddy, traefik, envoy, haproxy, tomcat, tomcat7, tomcat8, tomcat9, java, javaw, node, dotnet, python, python3, php, php-cgi, ruby
DbDaemons = sqlservr, mysqld, mariadbd, postgres, oracle, tnslsnr, db2sysc, fbserver, mongod, redis-server, memcached, couchdb, influxd, arangod

# Interpreters flagged by AppGuard
ShellInterpreters = cmd, powershell, pwsh, wscript, cscript, bash, sh, whoami, csc, cvtres, certutil, wmic, rundll32, regsvr32, msbuild, bitsadmin

[SuspiciousPaths]
# Paths flagged if executables are written/executed from them
SuspiciousPaths = \temp\, \programdata\, \inetpub\wwwroot\, \appdata\, \users\public\